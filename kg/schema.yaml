id: https://example.org/bio-kg/schema
name: bio_kg
title: Biodiversity Knowledge Graph Schema
description: >-
  LinkML schema for iNaturalist observations modelled as a knowledge graph.
  Observations are typed as DarwinCore Occurrences and BFO Processes;
  taxa carry Wikipedia links via rdfs:seeAlso; observers are PROV-O agents.
license: MIT

prefixes:
  linkml: https://w3id.org/linkml/
  bio:    https://example.org/bio-kg/
  dwc:    http://rs.tdwg.org/dwc/terms/
  bfo:    http://purl.obolibrary.org/obo/BFO_
  prov:   http://www.w3.org/ns/prov#
  rdfs:   http://www.w3.org/2000/01/rdf-schema#
  xsd:    http://www.w3.org/2001/XMLSchema#

default_prefix: bio
default_range: string

imports:
  - linkml:types

classes:
  Observation:
    description: A single observation of an organism at a place and time.
    class_uri: dwc:Occurrence
    mappings:
      - bfo:0000015
    slots:
      - id
      - event_date
      - decimal_latitude
      - decimal_longitude
      - observed_taxon
      - observer
      - iconic_group

  Taxon:
    description: A taxonomic group (species, genus, family, etc.).
    class_uri: dwc:Taxon
    slots:
      - id
      - scientific_name
      - common_name
      - wikipedia_url

  Agent:
    description: >-
      A person who recorded an observation. The IRI itself is the observer's
      iNaturalist user URL (or ORCID URL when available); no further data
      is stored on the agent node beyond the type declaration.
    class_uri: prov:Agent
    slots:
      - id

slots:
  id:
    identifier: true
    range: uriorcurie

  scientific_name:
    slot_uri: dwc:scientificName
    range: string
    required: true

  common_name:
    slot_uri: rdfs:label
    range: string

  event_date:
    slot_uri: dwc:eventDate
    range: date
    required: true

  decimal_latitude:
    slot_uri: dwc:decimalLatitude
    range: decimal
    required: true
    minimum_value: -90
    maximum_value: 90

  decimal_longitude:
    slot_uri: dwc:decimalLongitude
    range: decimal
    required: true
    minimum_value: -180
    maximum_value: 180

  observed_taxon:
    slot_uri: bio:observedTaxon
    range: Taxon
    required: true

  observer:
    slot_uri: prov:wasAttributedTo
    range: Agent
    required: true

  iconic_group:
    slot_uri: bio:iconicGroup
    range: string

  wikipedia_url:
    slot_uri: rdfs:seeAlso
    range: uriorcurie
